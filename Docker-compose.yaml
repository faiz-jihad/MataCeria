services:
  api:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - WORKERS=2
      - REDIS_HOST=redis
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: postgres_refraksi
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: redis_refraksi
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5mb"
        max-file: "2"

  nginx:
    image: nginx:alpine
    container_name: nginx_refraksi
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_refraksi
    restart: always
    command: tunnel --url http://nginx:80
    depends_on:
      - nginx
    logging:
      driver: "json-file"
      options:
        max-size: "5mb"
        max-file: "2"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_refraksi
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_refraksi
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

volumes:
  postgres_data:
  uploads_data:
  prometheus_data:
  grafana_data: