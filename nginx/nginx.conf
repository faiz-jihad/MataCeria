events {
    worker_connections 1024;
}

http {
    # Security: Hide Nginx version
    server_tokens off;

    upstream fastapi_app {
        # 'api' refers to the service name in docker-compose
        server api:8000;
    }

    server {
        listen 80;

        # Gzip Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_proxied any;
        gzip_min_length 1000;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';";

        # Limit request body for security (max 10MB)
        client_max_body_size 10M;

        location / {
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for long AI processes
            proxy_read_timeout 180s;
            proxy_connect_timeout 180s;
        }

        # Cache for Uploads
        location /uploads/ {
            proxy_pass http://fastapi_app/uploads/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Handle Prometheus metrics
        location /metrics {
            proxy_pass http://fastapi_app/metrics;
            proxy_set_header Host $host;
        }

        # Handle Health checks
        location /health {
            proxy_pass http://fastapi_app/health;
            proxy_set_header Host $host;
        }
    }
}
